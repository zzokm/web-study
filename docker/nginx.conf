server {
    listen 3000;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Never emit absolute redirects with the container port (breaks HTTPS behind Dokploy).
    absolute_redirect off;
    port_in_redirect off;

    client_max_body_size 50m;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 256;

    location /_next/static/ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location = /build-id.txt {
        default_type text/plain;
        add_header Cache-Control "no-store";
        try_files $uri =404;
    }

    # Lecture PDF assets (static)
    location ~* ^/lectures/.*\.pdf$ {
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # Textbook chapter PDFs (split chapters only)
    location ~* ^/book/.*\.pdf$ {
        add_header Cache-Control "public, max-age=86400";
        try_files $uri =404;
    }

    # pdf.js worker for practice slide refs (react-pdf) — needs JS MIME, not octet-stream
    location = /pdf.worker.min.mjs {
        default_type application/javascript;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    # EmbedPDF PDFium engine (must not fall through to index.html)
    location = /pdfium.wasm {
        default_type application/wasm;
        add_header Cache-Control "public, max-age=31536000, immutable";
        try_files $uri =404;
    }

    location / {
        try_files $uri $uri/ $uri/index.html /index.html;
    }
}
