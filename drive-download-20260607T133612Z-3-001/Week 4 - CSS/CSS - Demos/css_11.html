<!DOCTYPE html>
<html>
<head>
<style>
p::first-line {
  color: rgb(72, 0, 255);
  font-variant: small-caps;
}
</style>
</head>
<body>

<p>You can use the ::first-line pseudo-element to add a special
 effect to the first line of a text. Some more text.

</body>
</html>
