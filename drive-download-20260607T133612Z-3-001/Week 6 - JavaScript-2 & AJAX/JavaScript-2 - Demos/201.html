<script>
    function orderPizza() {
        return new Promise((resolve, reject) => {
            setTimeout(() => {
            let pizzaReady = true; // Set to false to test rejection

            if (pizzaReady) {
                resolve("Pizza is ready!");
            } else {
                reject(" Pizza shop ran out of dough.");
            }
            }, 5000); // Simulate a 5-second pizza preparation
        });
        }

async function dinnerTime() {
  console.log("1. You ordered a pizza.");

  // Start watching a movie while waiting
  let seconds = 0;
  const movieInterval = setInterval(() => {
    seconds++;
    console.log(`Watching movie... ${seconds} seconds passed`);
  }, 1000);

  try {
    const pizza = await orderPizza(); // Waits here while movie keeps playing
    console.log(`3. ${pizza}`);
  } catch (error) {
    console.log(`3. ${error}`);
  }

  clearInterval(movieInterval); // Stop the movie when pizza arrives or fails
  console.log("4. Now you're ready to eat! ");
}

dinnerTime();
</script>
