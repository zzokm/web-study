<html>
<head>
    <script>
        function myFunction(value) 
        {return value *2;}
        var numbers1 = [45, 4, 9, 16, 25];
        var numbers2 = numbers1.map(myFunction);
        document.writeln(numbers1);
        document.writeln("<br>");
        document.writeln(numbers2);      
       
        
    </script>
</head>
