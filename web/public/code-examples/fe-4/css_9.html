<!DOCTYPE html>
<html>
<head>
<style>
div {
  background-color: green;
  color: white;
  padding: 25px;
  text-align: center;
}

div:hover {
  background-color: blue;
}
div.myclass:hover{
  background-color:brown;
}
</style>
</head>
<body>

<p>Mouse over the div element below to change its background color:</p>
<div class="myclass">This is a new div</div>
&nbsp;
<div>Mouse Over Me</div>

</body>
</html>
